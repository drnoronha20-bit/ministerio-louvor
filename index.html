<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema Ministério de Louvor</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-database.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            width: 100%;
            max-width: 400px;
            padding: 40px;
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            border-bottom: 2px solid #eee;
        }

        .tab-btn {
            flex: 1;
            padding: 12px;
            border: none;
            background: none;
            cursor: pointer;
            font-size: 16px;
            color: #666;
            border-bottom: 3px solid transparent;
            transition: all 0.3s;
        }

        .tab-btn.active {
            color: #667eea;
            border-bottom-color: #667eea;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
        }

        input, select {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        input:focus, select:focus {
            outline: none;
            border-color: #667eea;
        }

        button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
        }

        button:hover {
            transform: translateY(-2px);
        }

        button:active {
            transform: translateY(0);
        }

        .error {
            color: #e74c3c;
            font-size: 14px;
            margin-top: 10px;
            display: none;
        }

        .success {
            color: #27ae60;
            font-size: 14px;
            margin-top: 10px;
            display: none;
        }

        #loginContainer, #dashboard {
            display: block;
        }

        #dashboard {
            display: none;
        }

        .dashboard-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 2px solid #eee;
        }

        .user-info {
            color: #333;
        }

        .user-info p {
            margin: 5px 0;
            font-size: 14px;
        }

        .logout-btn {
            background: #e74c3c;
            padding: 8px 16px;
            font-size: 14px;
        }

        .content-section {
            margin-top: 20px;
        }

        .content-section h3 {
            color: #333;
            margin-bottom: 15px;
        }

        .button-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .button-group button {
            flex: 1;
            min-width: 150px;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- LOGIN CONTAINER -->
        <div id="loginContainer">
            <div class="tabs">
                <button class="tab-btn active" onclick="switchTab('login')">Login</button>
                <button class="tab-btn" onclick="switchTab('signup')">Criar Conta</button>
            </div>

            <!-- LOGIN TAB -->
            <div id="login" class="tab-content active">
                <h2 style="margin-bottom: 20px; color: #333;">Bem-vindo</h2>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="loginEmail" placeholder="seu@email.com">
                </div>
                <div class="form-group">
                    <label>Tipo de Usuário</label>
                    <select id="loginType">
                        <option value="membro">Membro</option>
                        <option value="admin">Administrador</option>
                    </select>
                </div>
                <div class="form-group" id="adminCodeGroup" style="display: none;">
                    <label>Código de Administrador</label>
                    <input type="password" id="adminCode" placeholder="Digite o código">
                </div>
                <div class="form-group">
                    <label>Senha</label>
                    <input type="password" id="loginPassword" placeholder="Sua senha">
                </div>
                <button onclick="login()">Entrar</button>
                <div class="error" id="loginError"></div>
                <div class="success" id="loginSuccess"></div>
            </div>

            <!-- SIGNUP TAB -->
            <div id="signup" class="tab-content">
                <h2 style="margin-bottom: 20px; color: #333;">Criar Conta</h2>
                <div class="form-group">
                    <label>Nome Completo</label>
                    <input type="text" id="signupName" placeholder="Seu nome">
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="signupEmail" placeholder="seu@email.com">
                </div>
                <div class="form-group">
                    <label>Tipo de Usuário</label>
                    <select id="signupType">
                        <option value="membro">Membro</option>
                        <option value="admin">Administrador</option>
                    </select>
                </div>
                <div class="form-group" id="signupAdminCodeGroup" style="display: none;">
                    <label>Código de Administrador</label>
                    <input type="password" id="signupAdminCode" placeholder="Digite o código">
                </div>
                <div class="form-group">
                    <label>Senha</label>
                    <input type="password" id="signupPassword" placeholder="Crie uma senha">
                </div>
                <div class="form-group">
                    <label>Confirmar Senha</label>
                    <input type="password" id="signupPasswordConfirm" placeholder="Confirme a senha">
                </div>
                <button onclick="signup()">Criar Conta</button>
                <div class="error" id="signupError"></div>
                <div class="success" id="signupSuccess"></div>
            </div>
        </div>

        <!-- DASHBOARD -->
        <div id="dashboard" style="display: none;">
            <div class="dashboard-header">
                <div class="user-info">
                    <h3 id="userName">Bem-vindo</h3>
                    <p id="userEmail">email@exemplo.com</p>
                    <p id="userType">Membro</p>
                </div>
                <button class="logout-btn" onclick="logout()">Sair</button>
            </div>

            <div class="content-section">
                <h3>Opções do Sistema</h3>
                <div class="button-group">
                    <button onclick="alert('Funcionalidade em desenvolvimento')">Visualizar Músicas</button>
                    <button onclick="alert('Funcionalidade em desenvolvimento')">Meu Perfil</button>
                </div>
            </div>

            <div id="adminPanel" style="display: none; margin-top: 30px; padding-top: 30px; border-top: 2px solid #eee;">
                <h3>Painel Administrativo</h3>
                <div class="button-group">
                    <button onclick="alert('Funcionalidade em desenvolvimento')">Gerenciar Usuários</button>
                    <button onclick="alert('Funcionalidade em desenvolvimento')">Gerenciar Músicas</button>
                    <button onclick="alert('Funcionalidade em desenvolvimento')">Relatórios</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const ADMIN_CODE = 'LOUVOR2024';
        let currentUser = null;

        // Verificar login ao carregar
        window.addEventListener('load', () => {
            const saved = localStorage.getItem('currentUser');
            if (saved) {
                currentUser = JSON.parse(saved);
                showDashboard();
            }
        });

        function switchTab(tab) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
            document.getElementById(tab).classList.add('active');
            event.target.classList.add('active');

            // Mostrar/esconder campo de código admin
            if (tab === 'login') {
                document.getElementById('adminCodeGroup').style.display = document.getElementById('loginType').value === 'admin' ? 'block' : 'none';
            } else {
                document.getElementById('signupAdminCodeGroup').style.display = document.getElementById('signupType').value === 'admin' ? 'block' : 'none';
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('loginType').addEventListener('change', (e) => {
                document.getElementById('adminCodeGroup').style.display = e.target.value === 'admin' ? 'block' : 'none';
            });

            document.getElementById('signupType').addEventListener('change', (e) => {
                document.getElementById('signupAdminCodeGroup').style.display = e.target.value === 'admin' ? 'block' : 'none';
            });
        });

        function login() {
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            const type = document.getElementById('loginType').value;
            const adminCode = document.getElementById('adminCode').value;
            const errorDiv = document.getElementById('loginError');
            const successDiv = document.getElementById('loginSuccess');

            errorDiv.style.display = 'none';
            successDiv.style.display = 'none';

            if (!email || !password) {
                errorDiv.textContent = 'Preencha todos os campos!';
                errorDiv.style.display = 'block';
                return;
            }

            if (type === 'admin' && adminCode !== ADMIN_CODE) {
                errorDiv.textContent = 'Código de administrador inválido!';
                errorDiv.style.display = 'block';
                return;
            }

            currentUser = {
                email: email,
                type: type,
                name: email.split('@')[0]
            };

            localStorage.setItem('currentUser', JSON.stringify(currentUser));
            successDiv.textContent = 'Login realizado com sucesso!';
            successDiv.style.display = 'block';

            setTimeout(() => showDashboard(), 1000);
        }

        function signup() {
            const name = document.getElementById('signupName').value;
            const email = document.getElementById('signupEmail').value;
            const password = document.getElementById('signupPassword').value;
            const passwordConfirm = document.getElementById('signupPasswordConfirm').value;
            const type = document.getElementById('signupType').value;
            const adminCode = document.getElementById('signupAdminCode').value;
            const errorDiv = document.getElementById('signupError');
            const successDiv = document.getElementById('signupSuccess');

            errorDiv.style.display = 'none';
            successDiv.style.display = 'none';

            if (!name || !email || !password || !passwordConfirm) {
                errorDiv.textContent = 'Preencha todos os campos!';
                errorDiv.style.display = 'block';
                return;
            }

            if (password !== passwordConfirm) {
                errorDiv.textContent = 'As senhas não coincidem!';
                errorDiv.style.display = 'block';
                return;
            }

            if (password.length < 6) {
                errorDiv.textContent = 'A senha deve ter pelo menos 6 caracteres!';
                errorDiv.style.display = 'block';
                return;
            }

            if (type === 'admin' && adminCode !== ADMIN_CODE) {
                errorDiv.textContent = 'Código de administrador inválido!';
                errorDiv.style.display = 'block';
                return;
            }

            currentUser = {
                name: name,
                email: email,
                type: type
            };

            localStorage.setItem('currentUser', JSON.stringify(currentUser));
            successDiv.textContent = 'Conta criada com sucesso!';
            successDiv.style.display = 'block';

            setTimeout(() => showDashboard(), 1000);
        }

        function showDashboard() {
            document.getElementById('loginContainer').style.display = 'none';
            document.getElementById('dashboard').style.display = 'block';

            document.getElementById('userName').textContent = `Bem-vindo, ${currentUser.name}!`;
            document.getElementById('userEmail').textContent = currentUser.email;
            document.getElementById('userType').textContent = currentUser.type === 'admin' ? 'Administrador' : 'Membro';

            if (currentUser.type === 'admin') {
                document.getElementById('adminPanel').style.display = 'block';
            }
        }

        function logout() {
            localStorage.removeItem('currentUser');
            currentUser = null;
            document.getElementById('dashboard').style.display = 'none';
            document.getElementById('loginContainer').style.display = 'block';
            document.getElementById('login').classList.add('active');
            document.getElementById('signup').classList.remove('active');
            document.querySelectorAll('.tab-btn')[0].classList.add('active');
            document.querySelectorAll('.tab-btn')[1].classList.remove('active');
        }
    </script>
</body>
</html>
