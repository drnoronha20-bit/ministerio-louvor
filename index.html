<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Músicas - Ministério de Louvor</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            padding: 30px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 2px solid #eee;
        }

        .header h1 {
            color: #333;
        }

        .user-badge {
            background: #667eea;
            color: white;
            padding: 8px 15px;
            border-radius: 20px;
            font-size: 14px;
        }

        .back-btn {
            background: #667eea;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
        }

        .back-btn:hover {
            background: #764ba2;
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            border-bottom: 2px solid #eee;
        }

        .tab-btn {
            padding: 12px 20px;
            border: none;
            background: none;
            cursor: pointer;
            font-size: 16px;
            color: #666;
            border-bottom: 3px solid transparent;
            transition: all 0.3s;
        }

        .tab-btn.active {
            color: #667eea;
            border-bottom-color: #667eea;
        }

        .tab-btn:disabled {
            color: #ccc;
            cursor: not-allowed;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
        }

        input, select, textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
            font-family: inherit;
        }

        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: #667eea;
        }

        textarea {
            resize: vertical;
            min-height: 80px;
        }

        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 12px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: 600;
            transition: transform 0.2s;
        }

        button:hover {
            transform: translateY(-2px);
        }

        button:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }

        .message {
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 20px;
            display: none;
        }

        .success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .warning {
            background: #fff3cd;
            color: #856404;
            border: 1px solid #ffeeba;
        }

        .musicas-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .musica-card {
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 20px;
            background: #f9f9f9;
            transition: all 0.3s;
        }

        .musica-card:hover {
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }

        .musica-card h3 {
            color: #333;
            margin-bottom: 8px;
        }

        .musica-card p {
            color: #666;
            font-size: 14px;
            margin-bottom: 8px;
        }

        .musica-info {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }

        .badge {
            background: #667eea;
            color: white;
            padding: 4px 10px;
            border-radius: 15px;
            font-size: 12px;
        }

        .badge.tom {
            background: #3498db;
        }

        .badge.autor {
            background: #9b59b6;
        }

        .musica-actions {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        .edit-btn {
            background: #3498db;
            padding: 8px 12px;
            font-size: 12px;
            flex: 1;
        }

        .delete-btn {
            background: #e74c3c;
            padding: 8px 12px;
            font-size: 12px;
            flex: 1;
        }

        .restricted-message {
            background: #fff3cd;
            border: 1px solid #ffeeba;
            color: #856404;
            padding: 20px;
            border-radius: 8px;
            text-align: center;
        }

        .info-box {
            background: #e8f4f8;
            border-left: 4px solid #3498db;
            padding: 15px;
            margin-bottom: 20px;
            border-radius: 5px;
            color: #333;
        }

        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.4);
        }

        .modal.active {
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background-color: white;
            padding: 30px;
            border-radius: 10px;
            width: 90%;
            max-width: 500px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid #eee;
        }

        .modal-header h2 {
            color: #333;
        }

        .close-btn {
            background: none;
            border: none;
            font-size: 28px;
            cursor: pointer;
            color: #666;
            padding: 0;
            width: auto;
        }

        .close-btn:hover {
            color: #333;
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        .button-group button {
            flex: 1;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎵 Sistema de Músicas</h1>
            <div style="display: flex; gap: 15px; align-items: center;">
                <span class="user-badge" id="userBadge">Carregando...</span>
                <a href="index.html" class="back-btn">← Voltar</a>
            </div>
        </div>

        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('visualizar')">Visualizar Músicas</button>
            <button class="tab-btn" onclick="switchTab('adicionar')" id="tabAdicionar">Adicionar Música</button>
            <button class="tab-btn" onclick="switchTab('gerenciar')" id="tabGerenciar">Gerenciar</button>
        </div>

        <!-- TAB: VISUALIZAR -->
        <div id="visualizar" class="tab-content active">
            <h2 style="margin-bottom: 20px; color: #333;">Músicas Cadastradas</h2>
            <div class="musicas-grid" id="musicasList"></div>
        </div>

        <!-- TAB: ADICIONAR -->
        <div id="adicionar" class="tab-content">
            <h2 style="margin-bottom: 20px; color: #333;">Adicionar Nova Música</h2>
            <div id="adicionarContent"></div>
        </div>

        <!-- TAB: GERENCIAR -->
        <div id="gerenciar" class="tab-content">
            <h2 style="margin-bottom: 20px; color: #333;">Gerenciar Músicas</h2>
            <div id="gerenciarContent"></div>
        </div>
    </div>

    <!-- MODAL DE EDIÇÃO -->
    <div id="editModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Editar Música</h2>
                <button class="close-btn" onclick="closeModal()">×</button>
            </div>
            <div class="form-group">
                <label>Título</label>
                <input type="text" id="editTitulo" placeholder="Título da música">
            </div>
            <div class="form-group">
                <label>Artista/Autor</label>
                <input type="text" id="editArtista" placeholder="Artista ou autor">
            </div>
            <div class="form-group">
                <label>Tom</label>
                <input type="text" id="editTom" placeholder="Ex: Dó Maior">
            </div>
            <div class="form-group">
                <label>Letra</label>
                <textarea id="editLetra" placeholder="Cole a letra aqui..."></textarea>
            </div>
            <div class="button-group">
                <button onclick="salvarEdicao()" style="background: #27ae60;">Salvar</button>
                <button onclick="closeModal()" style="background: #95a5a6;">Cancelar</button>
            </div>
        </div>
    </div>

    <script>
        let musicas = JSON.parse(localStorage.getItem('musicas')) || [];
        let currentUser = JSON.parse(localStorage.getItem('currentUser')) || null;
        let musicaEmEdicao = null;

        window.addEventListener('load', () => {
            verificarPermissoes();
            renderMusicasList();
        });

        function verificarPermissoes() {
            const isAdmin = currentUser && currentUser.type === 'admin';
            const isMinistro = currentUser && currentUser.type === 'ministro';

            if (currentUser) {
                document.getElementById('userBadge').textContent = `${currentUser.type === 'admin' ? '👨‍💼' : currentUser.type === 'ministro' ? '🎤' : '👤'} ${currentUser.name}`;
            } else {
                window.location.href = 'index.html';
            }

            // Controlar abas
            document.getElementById('tabAdicionar').style.display = (isAdmin || isMinistro) ? 'block' : 'none';
            document.getElementById('tabGerenciar').style.display = isAdmin ? 'block' : 'none';

            // Renderizar conteúdo
            if (isAdmin || isMinistro) {
                renderAdicionarForm();
            }

            if (isAdmin) {
                renderGerenciarForm();
            }
        }

        function switchTab(tab) {
            const isAdmin = currentUser && currentUser.type === 'admin';
            const isMinistro = currentUser && currentUser.type === 'ministro';

            if ((tab === 'adicionar' && !(isAdmin || isMinistro)) || (tab === 'gerenciar' && !isAdmin)) {
                alert('❌ Você não tem permissão para acessar esta aba!');
                return;
            }

            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
            document.getElementById(tab).classList.add('active');
            event.target.classList.add('active');
        }

        function renderMusicasList() {
            const list = document.getElementById('musicasList');
            list.innerHTML = '';

            if (musicas.length === 0) {
                list.innerHTML = '<p style="grid-column: 1/-1; color: #999; text-align: center;">Nenhuma música cadastrada</p>';
                return;
            }

            musicas.forEach(musica => {
                const card = document.createElement('div');
                card.className = 'musica-card';
                card.innerHTML = `
                    <h3>${musica.titulo}</h3>
                    <p><strong>Artista:</strong> ${musica.artista}</p>
                    <div class="musica-info">
                        <span class="badge tom">🎼 ${musica.tom}</span>
                        <span class="badge autor">✍️ ${musica.adicionadoPor}</span>
                    </div>
                    <p style="color: #999; font-size: 12px;">Adicionada em: ${new Date(musica.data).toLocaleDateString('pt-BR')}</p>
                    ${currentUser.type === 'admin' ? `
                        <div class="musica-actions">
                            <button class="edit-btn" onclick="abrirEdicao(${musica.id})">Editar</button>
                            <button class="delete-btn" onclick="deletarMusica(${musica.id})">Deletar</button>
                        </div>
                    ` : ''}
                `;
                list.appendChild(card);
            });
        }

        function renderAdicionarForm() {
            const content = document.getElementById('adicionarContent');
            content.innerHTML = `
                <div class="info-box">
                    🎵 Adicione uma nova música ao acervo do ministério.
                </div>

                <div class="form-group">
                    <label>Título da Música</label>
                    <input type="text" id="titulo" placeholder="Ex: Graça Maior">
                </div>

                <div class="form-group">
                    <label>Artista/Autor</label>
                    <input type="text" id="artista" placeholder="Ex: Aline Barros">
                </div>

                <div class="form-group">
                    <label>Tom</label>
                    <input type="text" id="tom" placeholder="Ex: Dó Maior">
                </div>

                <div class="form-group">
                    <label>Letra (Opcional)</label>
                    <textarea id="letra" placeholder="Cole a letra da música aqui..."></textarea>
                </div>

                <button onclick="adicionarMusica()">Adicionar Música</button>
                <div class="message" id="adicionarMessage"></div>
            `;
        }

        function renderGerenciarForm() {
            const content = document.getElementById('gerenciarContent');
            content.innerHTML = `
                <div class="info-box">
                    🔧 Aqui você pode editar ou deletar músicas cadastradas.
                </div>

                <div class="musicas-grid" id="musicasGerenciar"></div>
            `;

            renderMusicasGerenciar();
        }

        function renderMusicasGerenciar() {
            const list = document.getElementById('musicasGerenciar');
            if (!list) return;

            list.innerHTML = '';

            if (musicas.length === 0) {
                list.innerHTML = '<p style="grid-column: 1/-1; color: #999; text-align: center;">Nenhuma música cadastrada</p>';
                return;
            }

            musicas.forEach(musica => {
                const card = document.createElement('div');
                card.className = 'musica-card';
                card.innerHTML = `
                    <h3>${musica.titulo}</h3>
                    <p><strong>Artista:</strong> ${musica.artista}</p>
                    <p><strong>Tom:</strong> ${musica.tom}</p>
                    <p style="color: #999; font-size: 12px;">Adicionada por: ${musica.adicionadoPor}</p>
                    <div class="musica-actions">
                        <button class="edit-btn" onclick="abrirEdicao(${musica.id})">Editar</button>
                        <button class="delete-btn" onclick="deletarMusica(${musica.id})">Deletar</button>
                    </div>
                `;
                list.appendChild(card);
            });
        }

        function adicionarMusica() {
            const titulo = document.getElementById('titulo').value.trim();
            const artista = document.getElementById('artista').value.trim();
            const tom = document.getElementById('tom').value.trim();
            const letra = document.getElementById('letra').value.trim();
            const messageDiv = document.getElementById('adicionarMessage');

            messageDiv.style.display = 'none';

            if (!titulo || !artista || !tom) {
                messageDiv.textContent = '❌ Preencha todos os campos obrigatórios!';
                messageDiv.className = 'message error';
                messageDiv.style.display = 'block';
                return;
            }

            const novaMusica = {
                id: Date.now(),
                titulo: titulo,
                artista: artista,
                tom: tom,
                letra: letra,
                adicionadoPor: currentUser.name,
                data: new Date().toISOString()
            };

            musicas.push(novaMusica);
            localStorage.setItem('musicas', JSON.stringify(musicas));

            messageDiv.textContent = `✅ Música "${titulo}" adicionada com sucesso!`;
            messageDiv.className = 'message success';
            messageDiv.style.display = 'block';

            document.getElementById('titulo').value = '';
            document.getElementById('artista').value = '';
            document.getElementById('tom').value = '';
            document.getElementById('letra').value = '';

            renderMusicasList();
            renderMusicasGerenciar();
        }

        function abrirEdicao(id) {
            const musica = musicas.find(m => m.id === id);
            if (!musica) return;

            musicaEmEdicao = musica;
            document.getElementById('editTitulo').value = musica.titulo;
            document.getElementById('editArtista').value = musica.artista;
            document.getElementById('editTom').value = musica.tom;
            document.getElementById('editLetra').value = musica.letra;

            document.getElementById('editModal').classList.add('active');
        }

        function closeModal() {
            document.getElementById('editModal').classList.remove('active');
            musicaEmEdicao = null;
        }

        function salvarEdicao() {
            if (!musicaEmEdicao) return;

            const titulo = document.getElementById('editTitulo').value.trim();
            const artista = document.getElementById('editArtista').value.trim();
            const tom = document.getElementById('editTom').value.trim();
            const letra = document.getElementById('editLetra').value.trim();

            if (!titulo || !artista || !tom) {
                alert('❌ Preencha todos os campos obrigatórios!');
                return;
            }

            const index = musicas.findIndex(m => m.id === musicaEmEdicao.id);
            if (index !== -1) {
                musicas[index] = {
                    ...musicas[index],
                    titulo: titulo,
                    artista: artista,
                    tom: tom,
                    letra: letra
                };

                localStorage.setItem('musicas', JSON.stringify(musicas));
                closeModal();
                renderMusicasList();
                renderMusicasGerenciar();
            }
        }

        function deletarMusica(id) {
            if (confirm('Tem certeza que deseja deletar esta música?')) {
                musicas = musicas.filter(m => m.id !== id);
                localStorage.setItem('musicas', JSON.stringify(musicas));
                renderMusicasList();
                renderMusicasGerenciar();
            }
        }

        // Fechar modal ao clicar fora
        window.onclick = function(event) {
            const modal = document.getElementById('editModal');
            if (event.target === modal) {
                closeModal();
            }
        }
    </script>
</body>
</html>
